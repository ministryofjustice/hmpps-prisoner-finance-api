server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

hmpps-auth:
  url: "http://localhost:8090/auth"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    version: 5.32.2
    enabled: true
  packages-to-scan: uk.gov.justice.digital.hmpps.prisonerfinanceapi
  packages-to-exclude:
     - uk.gov.justice.digital.hmpps.prisonerfinanceapi.clients

hmpps:
  sqs:
    provider: localstack
    queues:
      domainevents:
        queueName: prisoner-finance-event-queue
        dlqName: prisoner-finance-event-dlq
        subscribeTopicId: domainevents
        subscribeFilter: '{"eventType":[ "core-person-record.prison.record.created" ] }'
    topics:
      domainevents:
        arn: arn:aws:sns:eu-west-2:000000000000:11111111-2222-3333-4444-555555555555

general-ledger-api:
  url: http://localhost:8091
